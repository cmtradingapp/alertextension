services:
  app:
    build: ./server
    ports:
      - "3099:3099"
    env_file:
      - ./server/.env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - default
      - client-call-manager_default   # reach backoffice postgres for user auth

networks:
  client-call-manager_default:
    external: true
