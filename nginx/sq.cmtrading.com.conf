server {
    listen 80;
    server_name sq.cmtrading.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sq.cmtrading.com;

    # Reuse existing wildcard cert (*.cmtrading.com)
    ssl_certificate     /etc/letsencrypt/live/cmtrading.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cmtrading.com/privkey.pem;

    # SSE endpoint — disable buffering for real-time streaming
    location /events {
        proxy_pass http://localhost:3099/events;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Cache-Control 'no-cache';
        proxy_set_header X-Accel-Buffering 'no';
        proxy_buffering off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
    }

    # Webhook
    location /squaretalk-webhook {
        proxy_pass http://localhost:3099/squaretalk-webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Everything else
    location / {
        proxy_pass http://localhost:3099/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
