<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CMTrading Call Notifier</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 340px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    background: #0d1117;
    color: #c9d1d9;
  }
  .header {
    background: #161b22;
    border-bottom: 1px solid #21262d;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .logo { font-weight: 700; font-size: 14px; color: #f0f6fc; }
  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.04em;
  }
  .badge.connected { background: rgba(39,174,96,0.2); color: #27AE60; }
  .badge.disconnected { background: rgba(235,87,87,0.2); color: #EB5757; }
  .badge.offline { background: rgba(107,119,140,0.2); color: #6b778c; }
  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }
  .dot.green { background: #27AE60; box-shadow: 0 0 4px #27AE60; }
  .dot.red { background: #EB5757; }
  .dot.gray { background: #6b778c; }

  /* Login */
  #login-view { padding: 20px 14px; }
  #login-view h2 { font-size: 15px; color: #f0f6fc; margin-bottom: 16px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .field input {
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #f0f6fc;
    padding: 7px 10px;
    font-size: 13px;
    outline: none;
  }
  .field input:focus { border-color: #2D7EFF; }
  .btn {
    width: 100%;
    padding: 8px;
    background: #2D7EFF;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  .btn:hover { background: #1a6ef5; }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .error { color: #EB5757; font-size: 11px; margin-top: 8px; }

  /* Dashboard */
  #dashboard-view { display: none; }
  .agent-bar {
    background: #161b22;
    border-bottom: 1px solid #21262d;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
  }
  .agent-email { color: #8b949e; }
  .sign-out {
    background: none;
    border: none;
    color: #EB5757;
    font-size: 11px;
    cursor: pointer;
    padding: 2px 6px;
  }
  .sign-out:hover { text-decoration: underline; }
  .section-title {
    padding: 10px 14px 6px;
    font-size: 10px;
    font-weight: 600;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .empty { padding: 16px 14px; color: #6b778c; font-size: 12px; text-align: center; }
  .call-item {
    padding: 9px 14px;
    border-bottom: 1px solid #21262d;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .call-item:hover { background: #161b22; }
  .call-name { font-weight: 600; color: #f0f6fc; font-size: 13px; }
  .call-meta { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .call-time { font-size: 10px; color: #6b778c; flex-shrink: 0; margin-top: 2px; }
  .crm-link {
    display: inline-block;
    margin-top: 4px;
    font-size: 11px;
    color: #2D7EFF;
    text-decoration: none;
  }
  .crm-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">CMTrading</span>
  </div>
  <span id="status-badge" class="badge offline"><span class="dot gray" id="status-dot"></span>Offline</span>
</div>

<!-- Login -->
<div id="login-view">
  <h2>Sign in</h2>
  <div class="field">
    <label>Email / Username</label>
    <input type="text" id="username" placeholder="you@cmtrading.com" autocomplete="username">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" autocomplete="current-password">
  </div>
  <button class="btn" id="login-btn">Sign In</button>
  <div class="error" id="login-error"></div>
</div>

<!-- Dashboard -->
<div id="dashboard-view">
  <div class="agent-bar">
    <span class="agent-email" id="agent-email"></span>
    <button class="sign-out" id="sign-out-btn">Sign Out</button>
  </div>
  <div class="section-title">Recent Activity (last hour)</div>
  <div id="call-list"><div class="empty">No activity yet</div></div>
</div>

<script src="popup.js"></script>
</body>
</html>
